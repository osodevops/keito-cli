name: Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.1.3
        required: false
  push:
    tags:
      - v*.*.*

concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  pre-release-gate:
    name: Pre-release Gate
    runs-on: ubuntu-latest
    steps:
      - name: Verify release ref
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release workflow requires a semver tag like v0.1.3; got ${RELEASE_TAG}."
            exit 1
          fi
          if [[ "${GITHUB_REF_TYPE}" != "tag" && -z "${{ inputs.tag }}" ]]; then
            echo "::error::Manual release runs from a branch must provide the tag input."
            exit 1
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          fetch-tags: true

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-gate-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-gate-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all-targets

      - name: Build release binary
        run: cargo build --release

      - name: Smoke test binary
        run: |
          ./target/release/keito --version | grep -E '^keito [0-9]+\.[0-9]+\.[0-9]+'
          ./target/release/keito --help > /dev/null

      - name: Verify generated man pages
        run: |
          cargo run --bin gen-man -- /tmp/keito-man
          test -s /tmp/keito-man/keito.1
          test -s /tmp/keito-man/keito-auth-login.1
          test -s /tmp/keito-man/keito-time-stop.1

      - name: Install cargo-audit
        run: command -v cargo-audit >/dev/null || cargo install cargo-audit

      - name: Run security audit
        run: cargo audit

  build-assets:
    name: Build ${{ matrix.target }}
    needs: pre-release-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-release-build-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Unix
        if: runner.os != 'Windows'
        run: |
          cd "target/${{ matrix.target }}/release"
          tar czf "${GITHUB_WORKSPACE}/keito-${{ matrix.target }}.tar.gz" keito

      - name: Package Windows
        if: runner.os == 'Windows'
        run: |
          cd "target/${{ matrix.target }}/release"
          7z a "${GITHUB_WORKSPACE}/keito-${{ matrix.target }}.zip" keito.exe

      - name: Upload packaged asset
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: keito-${{ matrix.target }}
          path: keito-${{ matrix.target }}.*
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: build-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          fetch-tags: true

      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: keito-*
          path: dist
          merge-multiple: true

      - name: Extract changelog
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "::error::CHANGELOG.md has no release notes for ${VERSION}."
            exit 1
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          ls -la dist

          if gh release view "$RELEASE_TAG" > /dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes-file release_notes.md
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes-file release_notes.md \
              dist/*
          fi

  homebrew:
    name: Publish Homebrew Formula
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"

          gh release download "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --pattern "keito-aarch64-apple-darwin.tar.gz" \
            --output arm64.tar.gz
          gh release download "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --pattern "keito-x86_64-apple-darwin.tar.gz" \
            --output x86_64_mac.tar.gz
          gh release download "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --pattern "keito-x86_64-unknown-linux-gnu.tar.gz" \
            --output x86_64_linux.tar.gz

          BASE_URL="https://github.com/osodevops/keito-cli/releases/download/${RELEASE_TAG}"

          SHA_ARM64=$(sha256sum arm64.tar.gz | awk '{print $1}')
          SHA_X86_64_MAC=$(sha256sum x86_64_mac.tar.gz | awk '{print $1}')
          SHA_X86_64_LINUX=$(sha256sum x86_64_linux.tar.gz | awk '{print $1}')

          cat > keito.rb <<FORMULA
          class Keito < Formula
            desc "CLI for AI agents and humans to track billable time against Keito"
            homepage "https://github.com/osodevops/keito-cli"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/keito-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM64}"
              else
                url "${BASE_URL}/keito-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_64_MAC}"
              end
            end

            on_linux do
              url "${BASE_URL}/keito-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${SHA_X86_64_LINUX}"
            end

            def install
              bin.install "keito"
            end

            test do
              assert_match "keito #{version}", shell_output("#{bin}/keito --version")
            end
          end
          FORMULA

          sed -i 's/^          //' keito.rb

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/osodevops/homebrew-tap.git" tap
          cp keito.rb tap/Formula/keito.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/keito.rb
          git diff --staged --quiet || git commit -m "keito ${VERSION}"
          git push

  scoop:
    name: Trigger Scoop Manifest Update
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      # Requires osodevops/scoop-bucket to define an update-keito-manifest handler.
      - name: Trigger Scoop bucket update
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4
        with:
          token: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          repository: osodevops/scoop-bucket
          event-type: update-keito-manifest
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}", "tag": "${{ env.RELEASE_TAG }}"}'

  release-complete:
    name: Release Complete
    runs-on: ubuntu-latest
    needs: [pre-release-gate, build-assets, create-release, homebrew, scoop]
    if: always()
    steps:
      - name: Check release jobs
        shell: bash
        run: |
          if [ "${{ needs.pre-release-gate.result }}" != "success" ] || \
             [ "${{ needs.build-assets.result }}" != "success" ] || \
             [ "${{ needs.create-release.result }}" != "success" ] || \
             [ "${{ needs.homebrew.result }}" != "success" ] || \
             [ "${{ needs.scoop.result }}" != "success" ]; then
            echo "One or more release jobs failed"
            exit 1
          fi
          echo "Release completed"
